<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90" fill="none">
  <defs>
    <linearGradient id="frontD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#52D6CC"/>
      <stop offset="100%" stop-color="#2BADC6"/>
    </linearGradient>
    <linearGradient id="topD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#76E8E0"/>
      <stop offset="100%" stop-color="#4DC4D8"/>
    </linearGradient>
    <linearGradient id="sideD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2190AA"/>
      <stop offset="100%" stop-color="#186880"/>
    </linearGradient>
  </defs>

  <!-- Bar 1: shortest -->
  <rect x="2" y="46" width="18" height="28" fill="url(#frontD)"/>
  <polygon points="2,46 8,40 26,40 20,46" fill="url(#topD)"/>
  <rect x="20" y="40" width="6" height="34" fill="url(#sideD)"/>

  <!-- Bar 2: medium -->
  <rect x="28" y="26" width="18" height="48" fill="url(#frontD)"/>
  <polygon points="28,26 34,20 52,20 46,26" fill="url(#topD)"/>
  <rect x="46" y="20" width="6" height="54" fill="url(#sideD)"/>

  <!-- Bar 3: tallest -->
  <rect x="54" y="6" width="18" height="68" fill="url(#frontD)"/>
  <polygon points="54,6 60,0 78,0 72,6" fill="url(#topD)"/>
  <rect x="72" y="0" width="6" height="74" fill="url(#sideD)"/>

  <!-- Wordmark — white text for dark bg -->
  <text x="88" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#F4F4F5" letter-spacing="2.5">PRODUCT PATH</text>
  <text x="89" y="66" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#71717A" letter-spacing="0.5">Build products with confidence</text>
</svg>
